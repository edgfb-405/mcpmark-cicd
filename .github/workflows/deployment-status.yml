name: Deployment Status
on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Required to get previous commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint checks
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get previous commit SHA
        id: previous-commit
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package-version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            // Check and create required labels
            const requiredLabels = ['deployment', 'in-progress', 'completed'];
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch (error) {
                if (error.status === 404) {
                  // Create label with appropriate color
                  let color;
                  switch (label) {
                    case 'deployment':
                      color = '006b75'; // Teal
                      break;
                    case 'in-progress':
                      color = 'ff9a19'; // Orange
                      break;
                    case 'completed':
                      color = '0e8a16'; // Green
                      break;
                    default:
                      color = '5319e7'; // Purple (default)
                  }
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: color
                  });
                } else {
                  throw error;
                }
              }
            }

            // Create deployment tracking issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `
                ## Deployment Tracking
                - Commit SHA: ${context.sha}
                - Previous Commit SHA: ${{ steps.previous-commit.outputs.sha }}
                - Package Version: ${{ steps.package-version.outputs.version }}
              `
            });
            return issue.number;

      - name: Post pre-deployment completion comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.result }},
              body: "Pre-deployment checks completed"
            })

    outputs:
      issue-number: ${{ steps.create-issue.outputs.result }}
      previous-commit-sha: ${{ steps.previous-commit.outputs.sha }}
      package-version: ${{ steps.package-version.outputs.version }}
      current-commit-sha: ${{ github.sha }}

  rollback-preparation:
    runs-on: ubuntu-latest
    needs: pre-deployment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create rollback artifacts
        id: rollback-artifacts
        run: |
          # Create rollback script with error handling
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback to previous commit
          echo "Rolling back to commit: ${{ needs.pre-deployment.outputs.previous-commit-sha }}"
          git checkout ${{ needs.pre-deployment.outputs.previous-commit-sha }}

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm install --production

          # Verify installation
          echo "Verifying installation..."
          if ! npm ls --production --depth=0; then
            echo "Dependency verification failed"
            exit 1
          fi

          echo "✅ Rollback completed successfully"
          EOF
          chmod +x rollback.sh

          # Create dependency verification script
          cat > verify-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Verify dependencies match previous commit's package-lock.json
          echo "Verifying dependencies..."
          npm ci --dry-run --production
          if [ $? -eq 0 ]; then
            echo "✅ Dependency verification successful"
          else
            echo "❌ Dependency verification failed"
            exit 1
          fi
          EOF
          chmod +x verify-deps.sh

          # Backup configuration files
          mkdir -p rollback-backups
          cp package.json package-lock.json rollback-backups/
          echo "✅ Configuration files backed up"

          # Create rollback documentation
          cat > rollback-docs.md << 'EOF'
          # Rollback Instructions

          ## Prerequisites
          - GitHub CLI installed (optional, for artifact download)
          - Repository checked out to main branch

          ## Step-by-Step Rollback
          1. **Stop the application**
             ```bash
             # Example: Stop Node.js server
             pkill -f "node app.js"
             ```

          2. **Download rollback artifact**
             ```bash
             gh run download -n rollback-package-${{ github.sha }}.tar.gz
             tar -xzf rollback-package-${{ github.sha }}.tar.gz
             ```

          3. **Execute rollback script**
             ```bash
             cd rollback-package-${{ github.sha }}
             ./rollback.sh
             ```

          4. **Verify rollback**
             ```bash
             ./verify-deps.sh
             ```

          5. **Restart the application**
             ```bash
             # Example: Start Node.js server
             node app.js &
             ```

          ## Emergency Rollback
          For immediate rollback without artifact download:
          ```bash
          git checkout ${{ needs.pre-deployment.outputs.previous-commit-sha }}
          npm install --production
          ```
          EOF

          # Compress rollback package
          rollback_package="rollback-package-${{ github.sha }}.tar.gz"
          tar -czf $rollback_package rollback.sh verify-deps.sh rollback-backups/ rollback-docs.md
          echo "✅ Rollback package compressed"

          # Calculate SHA256 checksum
          checksum=$(sha256sum $rollback_package | awk '{print $1}')
          echo "✅ SHA256 checksum generated: $checksum"

          # Output artifact details
          echo "artifact-name=$rollback_package" >> $GITHUB_OUTPUT
          echo "checksum=$checksum" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rollback-artifacts.outputs.artifact-name }}
          path: ${{ steps.rollback-artifacts.outputs.artifact-name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `
                ## 🔄 Rollback Plan Ready
                - Previous Commit: ${{ needs.pre-deployment.outputs.previous-commit-sha }}
                - Current Commit: ${{ needs.pre-deployment.outputs.current-commit-sha }}
                - Package Version: ${{ needs.pre-deployment.outputs.package-version }}
                - Artifact: ${{ steps.rollback-artifacts.outputs.artifact-name }}
                - ✅ Rollback script created with error handling
                - ✅ Configuration files (package.json, package-lock.json) backed up
                - ✅ Dependency verification script created
                - ✅ Detailed rollback documentation prepared
                - ✅ Rollback package compressed with checksums
                ### Quick Rollback Command
                \`\`\`bash
                # Download artifact and execute rollback
                gh run download -n ${{ steps.rollback-artifacts.outputs.artifact-name }}
                tar -xzf ${{ steps.rollback-artifacts.outputs.artifact-name }}
                cd rollback-package-${{ github.sha }}
                ./rollback.sh
                \`\`\`
                - Rollback script created: true
                - Configuration backup: true
                - SHA256: ${{ steps.rollback-artifacts.outputs.checksum }}
              `
            })

    outputs:
      artifact-name: ${{ steps.rollback-artifacts.outputs.artifact-name }}
      checksum: ${{ steps.rollback-artifacts.outputs.checksum }}

  post-deployment:
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: 'in-progress'
            });
            // Add completed label
            await github.rest.issues.addLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: 'completed'
            });

      - name: Post final success comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `
                ## Deployment Completed Successfully
                ### Rollback Artifact Details
                - Artifact Name: ${{ needs.rollback-preparation.outputs.artifact-name }}
                - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.checksum }}
                - Retention Period: 30 days

                The deployment has been successfully completed. Rollback artifacts are available for download from this workflow run in case of future issues.
              `
            })

      - name: Close deployment tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: 'closed'
            })
